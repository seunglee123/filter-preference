<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Group Formation Tool · EGLC 754.25</title>
<style>
  :root{
    --navy:#1F3864; --blue:#2E75B6; --light:#E8F1F8; --line:#d7dee6;
    --bg:#f7f9fb; --card:#ffffff; --text:#1f2937; --muted:#5b6675; --warn:#b5651d;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.45}
  .wrap{max-width:820px;margin:0 auto;padding:22px 16px 64px}
  header h1{color:var(--navy);font-size:1.5rem;margin:0 0 2px}
  header p{color:var(--muted);margin:0 0 18px;font-size:.92rem}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;margin:0 0 18px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .step{display:flex;align-items:center;gap:10px;margin:0 0 12px}
  .num{flex:none;width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;font-weight:700;font-size:.9rem;display:flex;align-items:center;justify-content:center}
  h2{color:var(--navy);font-size:1.08rem;margin:0}
  label{font-weight:600;display:block;margin:0 0 6px}
  input[type=text],input[type=url],input[type=number],select{width:100%;padding:11px 12px;font-size:1rem;border:1px solid var(--line);border-radius:8px;outline:none;background:#fff}
  input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,117,182,.15)}
  button{font:inherit;font-weight:600;border:none;border-radius:8px;padding:11px 18px;cursor:pointer;background:var(--blue);color:#fff;transition:.12s}
  button:hover{background:#255f96}
  button.secondary{background:#eef2f6;color:var(--navy)}
  button.secondary:hover{background:#e2e8ef}
  button:disabled{opacity:.5;cursor:not-allowed}
  .row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
  .row > div{flex:1;min-width:150px}
  .inline{display:flex;gap:10px;align-items:center}
  .msg{margin-top:12px;padding:10px 12px;border-radius:8px;font-size:.92rem;display:none}
  .msg.ok{display:block;background:#e8f6ee;color:#2e8b57;border:1px solid #bfe3cd}
  .msg.err{display:block;background:#fdecec;color:#a33;border:1px solid #f3c9c9}
  .muted{color:var(--muted);font-size:.88rem}
  .hint{font-size:.82rem;color:var(--muted);margin-top:6px}
  .hidden{display:none}
  details summary{cursor:pointer;color:var(--blue);font-size:.9rem;margin-top:10px}
  textarea{width:100%;min-height:120px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.82rem;border:1px solid var(--line);border-radius:8px;padding:10px;margin-top:8px}
  .pill{display:inline-block;background:var(--light);border:1px solid #cfe0ef;color:var(--navy);border-radius:20px;padding:4px 11px;font-size:.84rem;font-weight:600;margin:2px 4px 2px 0}
  .filter-head{margin:18px 0 2px;color:var(--blue);font-weight:700;font-size:1.02rem;border-bottom:2px solid var(--light);padding-bottom:4px}
  .group{border:1px solid var(--line);border-radius:9px;padding:10px 14px;margin:8px 0;background:#fff}
  .group h4{margin:0 0 4px;color:var(--navy);font-size:.96rem}
  .group ul{margin:4px 0 0;padding-left:18px}
  .flag{background:#fff7e6;border:1px solid #f0dcb0}
  .sizehint{font-weight:600;color:var(--navy);font-size:.9rem;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Group Formation Tool</h1>
  </header>

  <!-- STEP 1 -->
  <section class="card">
    <div class="step"><div class="num">1</div><h2>Load your Google Form responses</h2></div>
    <label for="csvUrl">Published CSV link</label>
    <input type="url" id="csvUrl" placeholder="https://docs.google.com/spreadsheets/d/e/…/pub?output=csv" />
    <div class="hint">In the responses Sheet: File → Share → Publish to web → choose the responses tab → CSV → copy the link.</div>
    <div class="inline" style="margin-top:12px"><button id="loadBtn">Load responses</button><span id="loadCount" class="muted"></span></div>
    <details>
      <summary>Or paste the CSV directly</summary>
      <textarea id="csvPaste" placeholder="Paste rows here (commas or tabs both work — e.g., copied from a spreadsheet), then click Use pasted data"></textarea>
      <button id="pasteBtn" class="secondary" style="margin-top:8px">Use pasted data</button>
    </details>
    <div id="loadMsg" class="msg"></div>
  </section>

  <!-- STEP 2 -->
  <section class="card hidden" id="setupCard">
    <div class="step"><div class="num">2</div><h2>Set up the grouping</h2></div>
    <div class="row">
      <div>
        <label for="nameCol">Name column</label>
        <select id="nameCol"></select>
      </div>
      <div>
        <label for="varCol">Group by (variable)</label>
        <select id="varCol"></select>
      </div>
    </div>
    <div class="row" style="margin-top:14px">
      <div>
        <label for="size">Ideal group size</label>
        <input type="number" id="size" value="4" min="1" />
      </div>
      <div>
        <label for="pm">Plus / minus</label>
        <input type="number" id="pm" value="1" min="0" />
      </div>
      <div style="flex:2">
        <div class="sizehint" id="sizeHint">Groups of 4 (allowed 3–5)</div>
      </div>
    </div>
    <div class="inline" style="margin-top:16px"><button id="formBtn">Form groups</button><button id="reshuffleBtn" class="secondary">Re-shuffle</button></div>
  </section>

  <!-- STEP 3 -->
  <section class="card hidden" id="resultsCard">
    <div class="step"><div class="num">3</div><h2>Groups</h2></div>
    <div class="inline" style="margin-bottom:8px"><button id="presentBtn">Present (new page)</button><button id="copyBtn" class="secondary">Copy results</button><button id="downloadBtn" class="secondary">Download CSV</button><span id="copyMsg" class="muted"></span></div>
    <div id="results"></div>
  </section>
</div>

<script>
(function(){
  "use strict";
  const $=(id)=>document.getElementById(id);
  let rows=[];      // array of objects keyed by header
  let headers=[];   // column names
  let lastGroups=null;

  /* ---------- Delimiter detection (comma / tab / semicolon) ---------- */
  function detectDelim(text){
    const firstLine=(text.replace(/\r\n/g,"\n").split("\n")[0])||"";
    const counts={",":0,"\t":0,";":0}; let inQ=false;
    for(const ch of firstLine){
      if(ch==='"'){inQ=!inQ;continue;}
      if(!inQ && counts[ch]!==undefined) counts[ch]++;
    }
    let d=",", max=counts[","];
    if(counts["\t"]>max){max=counts["\t"];d="\t";}
    if(counts[";"]>max){max=counts[";"];d=";";}
    return d;
  }

  /* ---------- CSV/TSV parser (handles quotes, newlines) ---------- */
  function parseCSV(text,delim){
    delim=delim||",";
    const out=[]; let row=[], field="", i=0, inQ=false;
    text=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
    while(i<text.length){
      const c=text[i];
      if(inQ){
        if(c==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} inQ=false;i++;continue; }
        field+=c;i++;continue;
      }
      if(c==='"'){inQ=true;i++;continue;}
      if(c===delim){row.push(field);field="";i++;continue;}
      if(c==='\n'){row.push(field);out.push(row);row=[];field="";i++;continue;}
      field+=c;i++;
    }
    if(field.length||row.length){row.push(field);out.push(row);}
    return out.filter(r=>r.length && r.some(c=>c.trim()!==""));
  }
  function toObjects(matrix){
    if(!matrix.length) return {headers:[],rows:[]};
    const hs=matrix[0].map(h=>h.trim());
    const rs=matrix.slice(1).map(r=>{const o={};hs.forEach((h,j)=>o[h]=(r[j]||"").trim());return o;});
    return {headers:hs,rows:rs};
  }

  /* ---------- Load ---------- */
  function ingest(text){
    const parsed=toObjects(parseCSV(text, detectDelim(text)));
    if(!parsed.headers.length || !parsed.rows.length){ showLoad("err","No data found. Check that the link is a published CSV with at least one response."); return; }
    headers=parsed.headers; rows=parsed.rows;
    $("loadCount").textContent=`${rows.length} responses · ${headers.length} columns`;
    populateColumns();
    $("setupCard").classList.remove("hidden");
    $("resultsCard").classList.add("hidden");
    showLoad("ok","Loaded. Now choose your columns and group size below.");
  }
  function showLoad(type,t){ const m=$("loadMsg"); m.className="msg "+type; m.textContent=t; }

  $("loadBtn").addEventListener("click",async ()=>{
    const url=$("csvUrl").value.trim();
    if(!url){ showLoad("err","Paste the published CSV link first."); return; }
    $("loadBtn").disabled=true; $("loadCount").textContent="Loading…";
    try{
      const res=await fetch(url);
      if(!res.ok) throw new Error("HTTP "+res.status);
      const text=await res.text();
      if(text.trim().startsWith("<")) throw new Error("got HTML, not CSV");
      ingest(text);
    }catch(e){
      $("loadCount").textContent="";
      showLoad("err","Couldn't fetch that link ("+e.message+"). Make sure it's Published to web as CSV, or use the paste option.");
    }
    $("loadBtn").disabled=false;
  });
  $("pasteBtn").addEventListener("click",()=>{
    const t=$("csvPaste").value.trim();
    if(!t){ showLoad("err","Paste some CSV text first."); return; }
    ingest(t);
  });

  /* ---------- Column setup ---------- */
  function populateColumns(){
    const guessName=headers.find(h=>/name/i.test(h)) || headers[1] || headers[0];
    const guessVar=headers.find(h=>/(filter|prefer|topic|choice|group)/i.test(h)) || headers[headers.length-1];
    const opts=headers.map(h=>`<option value="${h.replace(/"/g,'&quot;')}">${h}</option>`).join("");
    $("nameCol").innerHTML=opts; $("varCol").innerHTML=opts;
    $("nameCol").value=guessName; $("varCol").value=guessVar;
  }
  function updateSizeHint(){
    const s=Math.max(1,parseInt($("size").value)||1), k=Math.max(0,parseInt($("pm").value)||0);
    const lo=Math.max(1,s-k), hi=s+k;
    $("sizeHint").textContent= k===0 ? `Groups of exactly ${s}` : `Groups of ${s} (allowed ${lo}–${hi})`;
  }
  $("size").addEventListener("input",updateSizeHint);
  $("pm").addEventListener("input",updateSizeHint);
  updateSizeHint();

  /* ---------- Grouping ---------- */
  function shuffle(a){const r=a.slice();for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
  function splitEven(arr,g){const n=arr.length,base=Math.floor(n/g),rem=n%g,out=[];let idx=0;for(let i=0;i<g;i++){const size=base+(i<rem?1:0);out.push(arr.slice(idx,idx+size));idx+=size;}return out;}
  function chooseGroupCount(n,lo,hi,target){
    let best=null;
    for(let g=1;g<=n;g++){
      const base=Math.floor(n/g),rem=n%g,maxS=rem?base+1:base,minS=base;
      if(minS<lo||maxS>hi) continue;
      const dev=Math.abs((n/g)-target);
      if(best===null||dev<best.dev) best={g,dev};
    }
    return best?best.g:null;
  }
  function groupNames(names,size,pm){
    const lo=Math.max(1,size-pm), hi=size+pm, n=names.length, sh=shuffle(names);
    if(n===0) return [];
    if(n<lo) return [{members:sh,flag:true}];                       // too few for any valid group
    const g=chooseGroupCount(n,lo,hi,size);
    if(g!==null) return splitEven(sh,g).map(c=>({members:c,flag:false}));
    // No clean partition (e.g., strict ±0 with a non-divisible count):
    // make as many full groups of `size` as possible, flag the remainder.
    const out=[]; let i=0; const full=Math.floor(n/size);
    for(let f=0;f<full;f++){ out.push({members:sh.slice(i,i+size),flag:false}); i+=size; }
    if(i<n) out.push({members:sh.slice(i),flag:true});
    return out;
  }
  function buildGroups(){
    const nameCol=$("nameCol").value, varCol=$("varCol").value;
    const size=Math.max(1,parseInt($("size").value)||1), pm=Math.max(0,parseInt($("pm").value)||0);
    const byVal={};
    rows.forEach(r=>{
      const v=(r[varCol]||"(blank)").trim()||"(blank)";
      const name=(r[nameCol]||"(unnamed)").trim()||"(unnamed)";
      (byVal[v]=byVal[v]||[]).push(name);
    });
    const order=Object.keys(byVal).sort((a,b)=>a.localeCompare(b));
    return order.map(v=>({value:v, groups:groupNames(byVal[v],size,pm)}));
  }

  /* ---------- Render ---------- */
  // flatten into a single sequence with running group numbers (1,2,3… across all values)
  function flatten(data){
    let n=0; const arr=[];
    data.forEach(b=>b.groups.forEach(g=>{ n++; arr.push({n, value:b.value, members:g.members, flag:g.flag}); }));
    return arr;
  }
  function render(data){
    const el=$("results");
    if(!data||!data.length){ el.innerHTML='<p class="muted">No groups.</p>'; return; }
    let html="", n=0;
    data.forEach(block=>{
      html+=`<div class="filter-head">${esc(block.value)} <span class="muted">(${block.groups.reduce((s,g)=>s+g.members.length,0)})</span></div>`;
      block.groups.forEach((grp)=>{
        n++;
        const flag=grp.flag?` <span class="muted">— needs manual placement (${grp.members.length})</span>`:"";
        html+=`<div class="group${grp.flag?' flag':''}"><h4>Group ${n} · ${grp.members.length} member${grp.members.length===1?"":"s"}${flag}</h4><ul>${grp.members.map(m=>`<li>${esc(m)}</li>`).join("")}</ul></div>`;
      });
    });
    el.innerHTML=html;
  }
  function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

  /* ---------- Presentation view (new page, auto-fit columns) ---------- */
  function openPresentation(data){
    const flat=flatten(data);
    if(!flat.length) return;
    const varName=esc($("varCol").value);
    const cards=flat.map(g=>
      `<div class="g${g.flag?' flag':''}"><h3>Group ${g.n}</h3><div class="v">${esc(g.value)}${g.flag?' · needs manual placement':''}</div><ul>${g.members.map(m=>`<li>${esc(m)}</li>`).join("")}</ul></div>`
    ).join("");
    const html=
`<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Groups</title>
<style>
:root{--fs:17px}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:-apple-system,Arial,sans-serif;font-size:var(--fs);color:#1f2937;display:flex;flex-direction:column}
.bar{flex:none;background:#1F3864;color:#fff;padding:8px 16px;display:flex;justify-content:space-between;align-items:center}
.bar h1{font-size:1.05em;margin:0;font-weight:700}
.bar .sub{font-size:.8em;opacity:.85;font-weight:400;margin-left:10px}
.bar button{font:inherit;font-size:.82em;border:none;border-radius:6px;padding:6px 12px;margin-left:8px;cursor:pointer;background:#e8f1f8;color:#1F3864;font-weight:600}
.cols{flex:1;overflow:hidden;column-width:215px;column-gap:16px;padding:14px 16px}
.g{break-inside:avoid;border:1px solid #d7dee6;border-radius:8px;padding:7px 11px;margin:0 0 11px;background:#fff}
.g h3{margin:0;color:#1F3864;font-size:1em}
.g .v{color:#2E75B6;font-size:.76em;font-weight:600;margin:1px 0 4px}
.g ul{margin:0;padding-left:1.05em}
.g li{font-size:.9em;line-height:1.35}
.g.flag{background:#fff7e6;border-color:#f0dcb0}
@media print{.bar{background:#1F3864 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.noprint{display:none}.cols{overflow:visible}}
</style></head>
<body>
<div class="bar"><h1>Country Analysis — Groups<span class="sub">grouped by ${varName}</span></h1><div class="noprint"><button onclick="fit()">Re-fit</button><button onclick="window.print()">Print</button></div></div>
<div class="cols" id="cols">${cards}</div>
<script>
function fit(){var fs=17;var r=document.documentElement;r.style.setProperty('--fs',fs+'px');var c=document.getElementById('cols');while((c.scrollHeight>c.clientHeight||document.body.scrollHeight>window.innerHeight)&&fs>8){fs-=0.5;r.style.setProperty('--fs',fs+'px');}}
window.addEventListener('load',fit);window.addEventListener('resize',fit);
<\/script>
</body></html>`;
    const w=window.open("","_blank");
    if(!w){ alert("Please allow pop-ups for this page to open the presentation view."); return; }
    w.document.open(); w.document.write(html); w.document.close();
  }

  $("formBtn").addEventListener("click",()=>{ lastGroups=buildGroups(); render(lastGroups); $("resultsCard").classList.remove("hidden"); $("resultsCard").scrollIntoView({behavior:"smooth"}); });
  $("reshuffleBtn").addEventListener("click",()=>{ if(!rows.length)return; lastGroups=buildGroups(); render(lastGroups); $("resultsCard").classList.remove("hidden"); });

  /* ---------- Export ---------- */
  function groupsToText(data){
    let t="Group Assignments — grouped by "+$("varCol").value+"\n"; let n=0;
    data.forEach(b=>{ t+=`\n${b.value}\n`; b.groups.forEach((g)=>{ n++; t+=`  Group ${n}${g.flag?" (needs manual placement)":""}: ${g.members.join(", ")}\n`; }); });
    return t;
  }
  $("presentBtn").addEventListener("click",()=>{ if(lastGroups) openPresentation(lastGroups); });
  $("copyBtn").addEventListener("click",()=>{ if(lastGroups) navigator.clipboard.writeText(groupsToText(lastGroups)).then(()=>{ $("copyMsg").textContent="Copied."; setTimeout(()=>$("copyMsg").textContent="",1600); }); });
  $("downloadBtn").addEventListener("click",()=>{
    if(!lastGroups)return;
    let r=[["Value","Group","Member","NeedsManualPlacement"]]; let n=0;
    lastGroups.forEach(b=>b.groups.forEach(g=>{ n++; g.members.forEach(m=>r.push([b.value,`Group ${n}`,m,g.flag?"yes":""])); }));
    const csv=r.map(x=>x.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download="groups.csv"; a.click();
  });
})();
</script>
</body>
</html>
